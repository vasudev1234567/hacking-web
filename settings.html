    <div class="main-wrapper">
        <div class="container">
            <div class="admin-panel" style="max-width: 900px;">
                <h2>&gt; System Settings_</h2>

                <!-- Theme Settings -->
                <div class="form-group" style="margin-bottom: 40px;">
                    <h3 style="color: var(--text-main); font-size: 1.5rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                        Theme Configuration</h3>
                    <label for="themeSelect">Select Preset Theme</label>
                    <select id="themeSelect"
                        style="width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--neon-green); padding: 15px; font-size: 1.1rem; border-radius: 6px; outline: none; margin-bottom: 20px;">
                        <option value="cyberpunk">Cyberpunk (Default)</option>
                        <option value="matrix">Matrix (Deep Black &amp; Green)</option>
                        <option value="midnight">Midnight Blue (Blue/Grey &amp; Cyan)</option>
                        <option value="kali">Kali Linux Dragon (Interactive 3D)</option>
                        <option value="light">Classic Light (Clean Mode)</option>
                    </select>
                </div>

                <!-- Wallpaper Settings -->
                <div class="form-group" style="margin-bottom: 40px;">
                    <h3 style="color: var(--text-main); font-size: 1.5rem; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">
                        Wallpaper Configuration</h3>

                    <label>Preset Backgrounds</label>
                    <div style="display: flex; gap: 15px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;">
                        <div class="wallpaper-thumb"
                            data-url="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=2070&auto=format&fit=crop"
                            style="min-width: 150px; height: 100px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; background-image: url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center;">
                        </div>
                        <div class="wallpaper-thumb"
                            data-url="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop"
                            style="min-width: 150px; height: 100px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center;">
                        </div>
                        <div class="wallpaper-thumb"
                            data-url="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop"
                            style="min-width: 150px; height: 100px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; background-image: url('https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=2070&auto=format&fit=crop'); background-size: cover; background-position: center;">
                        </div>
                    </div>

                    <label for="customImageWallpaper" style="display: block; margin-top: 15px; margin-bottom: 5px; color: var(--text-main);">Option 1: Static Image Wallpaper (Local File)</label>
                    <input type="file" accept="image/*" id="customImageWallpaper"
                        style="width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color); color: white; padding: 10px; font-size: 1rem; border-radius: 4px; outline: none; cursor: pointer;">

                    <label for="customLiveWallpaper" style="display: block; margin-top: 20px; margin-bottom: 5px; color: var(--text-main);">Option 2: Live Wallpaper (Local Video/GIF)</label>
                    <input type="file" accept="video/*,image/gif" id="customLiveWallpaper"
                        style="width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color); color: white; padding: 10px; font-size: 1rem; border-radius: 4px; outline: none; cursor: pointer;">
                    <small style="color: #8b949e; display: block; margin-top: 8px;">* Note: Browser storage limits may restrict saving very large video files (&gt;5MB). Compress your media if necessary.</small>
                </div>

                <!-- Actions -->
                <div style="display: flex; gap: 20px; margin-top: 30px;">
                    <button id="saveSettingsBtn" class="btn-save" style="margin-top: 0;">Save Changes</button>
                    <button id="resetSettingsBtn" class="btn-save"
                        style="margin-top: 0; background-color: transparent; border: 1px solid #ff4444; color: #ff4444;">Reset to Default</button>
                </div>

                <p id="settings-status"
                    style="color: var(--neon-green); margin-top: 15px; font-weight: bold; text-align: center; display: none;">
                    Settings Saved Successfully!</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeSelect = document.getElementById('themeSelect');
            const customImageWallpaper = document.getElementById('customImageWallpaper');
            const customLiveWallpaper = document.getElementById('customLiveWallpaper');
            const saveBtn = document.getElementById('saveSettingsBtn');
            const resetBtn = document.getElementById('resetSettingsBtn');
            const statusMsg = document.getElementById('settings-status');
            const thumbs = document.querySelectorAll('.wallpaper-thumb');

            let selectedWallpaper = localStorage.getItem('cyberWallpaper') || '';
            let selectedWallpaperType = localStorage.getItem('cyberWallpaperType') || '';

            themeSelect.value = localStorage.getItem('cyberTheme') || 'cyberpunk';

            customImageWallpaper.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                customLiveWallpaper.value = '';
                const reader = new FileReader();
                reader.onload = function (event) {
                    selectedWallpaper = event.target.result;
                    selectedWallpaperType = 'image';
                    updateThumbSelection();
                };
                reader.readAsDataURL(file);
            });

            customLiveWallpaper.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                customImageWallpaper.value = '';
                const reader = new FileReader();
                reader.onload = function (event) {
                    selectedWallpaper = event.target.result;
                    selectedWallpaperType = 'live';
                    updateThumbSelection();
                };
                reader.readAsDataURL(file);
            });

            function updateThumbSelection() {
                thumbs.forEach(t => {
                    t.style.borderColor = (t.dataset.url === selectedWallpaper) ? 'var(--neon-green)' : 'transparent';
                });
            }
            updateThumbSelection();

            thumbs.forEach(thumb => {
                thumb.addEventListener('click', () => {
                    selectedWallpaper = thumb.dataset.url;
                    selectedWallpaperType = 'image';
                    customImageWallpaper.value = '';
                    customLiveWallpaper.value = '';
                    updateThumbSelection();
                });
            });

            saveBtn.addEventListener('click', async () => {
                localStorage.setItem('cyberTheme', themeSelect.value);
                if (selectedWallpaper !== '') {
                    try {
                        await window.saveWallpaperDB(selectedWallpaper, selectedWallpaperType);
                        localStorage.removeItem('cyberWallpaper');
                        localStorage.removeItem('cyberWallpaperType');
                    } catch (e) {
                        alert("Error saving wallpaper to IndexedDB. File might be extremely large or corrupted.");
                        return;
                    }
                } else {
                    await window.clearWallpaperDB();
                    localStorage.removeItem('cyberWallpaper');
                    localStorage.removeItem('cyberWallpaperType');
                }
                await applyTheme();
                statusMsg.textContent = 'Settings Saved Successfully!';
                statusMsg.style.color = 'var(--neon-green)';
                statusMsg.style.display = 'block';
                setTimeout(() => { statusMsg.style.display = 'none'; }, 3000);
            });

            resetBtn.addEventListener('click', async () => {
                localStorage.removeItem('cyberTheme');
                localStorage.removeItem('cyberWallpaper');
                localStorage.removeItem('cyberWallpaperType');
                await window.clearWallpaperDB();
                themeSelect.value = 'cyberpunk';
                selectedWallpaper = '';
                customImageWallpaper.value = '';
                customLiveWallpaper.value = '';
                updateThumbSelection();
                await applyTheme();
                statusMsg.textContent = 'Reset to Defaults!';
                statusMsg.style.color = '#ff4444';
                statusMsg.style.display = 'block';
                setTimeout(() => { statusMsg.style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>
